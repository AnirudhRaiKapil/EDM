name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/edm-platform
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: services/edm-platform/requirements.txt

      - run: pip install -r requirements.txt
      - run: pytest -v

  cli:
    runs-on: ubuntu-latest
    needs: backend
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: cli/pyproject.toml

      - run: pip install -e .
      - run: edm --help
