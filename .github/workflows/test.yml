name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/edm-platform
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: services/edm-platform/requirements.txt

      - run: pip install -r requirements.txt
      - run: pytest -v

  cli:
    runs-on: ubuntu-latest
    needs: backend
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: cli/pyproject.toml

      - run: pip install -e .
      - run: edm --help

  ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - run: npm ci
      - run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: [backend, ui]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: services/edm-platform/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Install backend
        working-directory: services/edm-platform
        run: |
          pip install -r requirements.txt
          cp .env.example .env

      - name: Install UI + Playwright Chromium
        working-directory: ui
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Start backend
        working-directory: services/edm-platform
        run: |
          uvicorn app.main:app --port 8000 > backend.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8000/health && exit 0
            sleep 1
          done
          echo "backend never became healthy"; cat backend.log; exit 1

      - name: Start UI dev server
        working-directory: ui
        run: |
          npm run dev > frontend.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:5173/ && exit 0
            sleep 1
          done
          echo "frontend never became healthy"; cat frontend.log; exit 1

      - name: Run e2e smoke test
        working-directory: ui
        run: npm run e2e

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots
          path: ui/e2e/shots/
          if-no-files-found: ignore

      - name: Upload server logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-server-logs
          path: |
            services/edm-platform/backend.log
            ui/frontend.log
          if-no-files-found: ignore
